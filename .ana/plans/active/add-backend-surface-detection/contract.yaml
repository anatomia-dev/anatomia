version: "1.0"
sealed_by: "AnaPlan"
feature: "Backend Service Surface Detection"

assertions:
  # AC1: Signal 3 continue fix
  - id: A001
    says: "A backend package matching both a config file and a server framework is detected exactly once"
    block: "signal 3 continue prevents duplicate candidates"
    target: "surfaces.length"
    matcher: "equals"
    value: 1

  # AC2: SERVER_FRAMEWORK_DEPS constant
  - id: A002
    says: "The server framework list contains exactly ten frameworks"
    block: "SERVER_FRAMEWORK_DEPS has correct size"
    target: "SERVER_FRAMEWORK_DEPS.size"
    matcher: "equals"
    value: 10

  - id: A003
    says: "Express is recognized as a server framework"
    block: "SERVER_FRAMEWORK_DEPS includes express"
    target: "SERVER_FRAMEWORK_DEPS.has('express')"
    matcher: "truthy"

  - id: A004
    says: "Fastify is recognized as a server framework"
    block: "SERVER_FRAMEWORK_DEPS includes fastify"
    target: "SERVER_FRAMEWORK_DEPS.has('fastify')"
    matcher: "truthy"

  - id: A005
    says: "NestJS core is recognized as a server framework"
    block: "SERVER_FRAMEWORK_DEPS includes @nestjs/core"
    target: "SERVER_FRAMEWORK_DEPS.has('@nestjs/core')"
    matcher: "truthy"

  - id: A006
    says: "Hono is recognized as a server framework"
    block: "SERVER_FRAMEWORK_DEPS includes hono"
    target: "SERVER_FRAMEWORK_DEPS.has('hono')"
    matcher: "truthy"

  # AC3: Production deps only
  - id: A007
    says: "A server framework in dev dependencies does not trigger backend detection"
    block: "signal 4 ignores devDeps"
    target: "surfaces.length"
    matcher: "equals"
    value: 0

  # AC4: File count threshold
  - id: A008
    says: "A backend with fewer than fifteen source files is not detected as a surface"
    block: "signal 4 rejects packages below MIN_FILES_SERVER_DEP"
    target: "surfaces.length"
    matcher: "equals"
    value: 0

  - id: A009
    says: "The minimum file threshold for server dependency detection is fifteen"
    block: "MIN_FILES_SERVER_DEP is 15"
    target: "MIN_FILES_SERVER_DEP"
    matcher: "equals"
    value: 15

  # AC5: dev and start:dev scripts
  - id: A010
    says: "A backend with a dev script and server framework is detected as a surface"
    block: "signal 4 detects server framework + dev script"
    target: "surfaces.length"
    matcher: "equals"
    value: 1

  - id: A011
    says: "A NestJS backend using start:dev is detected as a surface"
    block: "signal 4 detects server framework + start:dev script"
    target: "surfaces.length"
    matcher: "equals"
    value: 1

  - id: A012
    says: "A server framework without a dev or start:dev script is not detected"
    block: "signal 4 rejects packages without dev or start:dev"
    target: "surfaces.length"
    matcher: "equals"
    value: 0

  # AC6: Signal ordering
  - id: A013
    says: "Signal evaluation order is documented in the source code"
    block: "signal 4 comment documents evaluation order"
    target: "comment"
    matcher: "exists"

  # AC7: Named constant
  - id: A014
    says: "The file count threshold is a named constant, not a magic number"
    block: "MIN_FILES_SERVER_DEP is exported"
    target: "MIN_FILES_SERVER_DEP"
    matcher: "exists"

  # AC8: JSDoc update
  - id: A015
    says: "The module documentation describes all four detection signals"
    block: "module JSDoc documents four signals"
    target: "jsdoc"
    matcher: "contains"
    value: "Four signals"

  # AC9: No regressions
  - id: A016
    says: "All existing surface detection tests pass without modification"
    block: "existing 69 tests pass"
    target: "existingTestCount"
    matcher: "equals"
    value: 69

file_changes:
  - path: "packages/cli/src/engine/detectors/surfaces.ts"
    action: modify
  - path: "packages/cli/tests/engine/detectors/surfaces.test.ts"
    action: modify
