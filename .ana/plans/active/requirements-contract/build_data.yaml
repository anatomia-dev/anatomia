    severity: observation
    suggested_action: acknowledge
  - summary: "validateReqContent(content, stem) was extracted as a content-based core of validateReqFormat so req list can flag malformed rows off-branch (git ls-tree mode) with the same messages. Additive to the spec's stated (filePath) signature; keeps a single validation implementation."
    file: "packages/cli/src/commands/artifact-validators.ts"
    severity: observation
    suggested_action: acknowledge
  - summary: "commitSaves gained an optional extraPaths parameter so a --req-claimed requirement rides in the same 'Start work' commit; the function previously scoped its commit strictly to .saves.json. Backward compatible (default empty)."
    file: "packages/cli/src/commands/work.ts"
    severity: debt
