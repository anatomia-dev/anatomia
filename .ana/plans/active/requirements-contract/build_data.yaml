  - summary: "req list falls back to git ls-tree (off-branch) mode when getCurrentBranch() returns null (e.g. a commitless repo), which yields an empty list. Benign — a real project always has commits — but the empty result is silent."
    file: "packages/cli/src/commands/req-state.ts"
