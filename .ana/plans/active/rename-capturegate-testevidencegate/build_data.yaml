concerns:
  - summary: "Test-evidence seal proves nothing about the run. The marker's sha256 is computed over the marker's OWN visible fields (canonicalCaptureString = stage+slug+counts+verdict, capture-marker.ts:105/119), NOT over the raw test output (capture-marker.ts:6-7 says so explicitly). The present-check only requires a 64-hex sha (capture-marker.ts:185-186) and never recomputes it. Consequences: (1) every passing run yields a byte-identical marker, so re-sealing is a no-op; (2) a valid marker is hand-forgeable with zero tests run — `counts=Np/0f/Ms verdict=pass sha256=<any 64 hex>` passes. The gate enforces format, not truth. Pre-existing and out of scope for this rename (capture-marker mechanism is the untouched boundary); already noted in the risk profile as the deferred enginebind token. Filed as GitHub issue #311."
    file: "packages/cli/src/utils/capture-marker.ts"
    severity: risk
    suggested_action: scope
