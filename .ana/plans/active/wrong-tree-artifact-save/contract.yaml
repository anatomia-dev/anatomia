version: "1.0"
sealed_by: "AnaPlan"
feature: "Wrong-Tree Artifact Save"

assertions:
  # AC1: Scenario A — agent on main, file relocated to worktree
  - id: A001
    says: "Build reports written to the wrong tree are automatically moved to the worktree"
    block: "relocates build report from main tree to worktree (Scenario A)"
    target: "worktreeFile"
    matcher: "exists"

  - id: A002
    says: "The commit after relocation lands on the feature branch, not main"
    block: "relocates build report from main tree to worktree (Scenario A)"
    target: "commitBranch"
    matcher: "not_equals"
    value: "main"

  - id: A003
    says: "A warning tells the agent where to write next time"
    block: "relocates build report from main tree to worktree (Scenario A)"
    target: "warningOutput"
    matcher: "contains"
    value: "Write here next time"

  # AC2: Normal worktree behavior unchanged
  - id: A004
    says: "Reports written to the correct worktree save normally without warnings"
    block: "saves normally when file is already in worktree"
    target: "commitMessage"
    matcher: "contains"
    value: "Build report"

  # AC3: No worktree — no change
  - id: A005
    says: "Without a worktree, saving from the wrong branch still errors"
    block: "errors normally when no worktree exists and on wrong branch"
    target: "exitCode"
    matcher: "not_equals"
    value: 0

  # AC4: Companion YAML relocation
  - id: A006
    says: "Companion data files move alongside their reports"
    block: "relocates companion YAML alongside report"
    target: "worktreeCompanionFile"
    matcher: "exists"

  - id: A007
    says: "The companion file is removed from the original location after relocation"
    block: "relocates companion YAML alongside report"
    target: "mainTreeCompanionFile"
    matcher: "not_equals"
    value: true

  # AC5: Planning artifacts never relocate
  - id: A008
    says: "Scope files are never relocated even when a worktree exists"
    block: "does not relocate planning artifacts"
    target: "exitBehavior"
    matcher: "equals"
    value: "error"

  - id: A009
    says: "Spec files are never relocated even when a worktree exists"
    block: "does not relocate planning artifacts"
    target: "planningRelocated"
    matcher: "equals"
    value: false

  # AC6: Commit targets feature branch (covered by A002)

  # AC7: Warning includes worktree path
  - id: A010
    says: "The relocation warning includes the worktree directory path"
    block: "relocates build report from main tree to worktree (Scenario A)"
    target: "warningOutput"
    matcher: "contains"
    value: "worktrees/"

  # AC8: File in both trees
  - id: A011
    says: "When the file exists in both trees, the worktree copy is used"
    block: "prefers worktree copy when file exists in both trees"
    target: "commitSucceeded"
    matcher: "equals"
    value: true

  - id: A012
    says: "The main tree copy is not deleted when both trees have the file"
    block: "prefers worktree copy when file exists in both trees"
    target: "mainTreeFileExists"
    matcher: "equals"
    value: true

  # Scenario B — agent in worktree, file on main
  - id: A013
    says: "Reports found on the main tree are pulled into the worktree when the agent runs from the worktree"
    block: "relocates file from main tree when agent is in worktree (Scenario B)"
    target: "worktreeFile"
    matcher: "exists"

  - id: A014
    says: "The original file on main is removed after relocation to the worktree"
    block: "relocates file from main tree when agent is in worktree (Scenario B)"
    target: "mainTreeFileExists"
    matcher: "equals"
    value: false

  # getMainTreeRoot utility
  - id: A015
    says: "The main tree root can be resolved from inside a worktree"
    block: "getMainTreeRoot returns main tree path from worktree"
    target: "mainTreeRoot"
    matcher: "exists"

  - id: A016
    says: "The main tree root is not the worktree itself"
    block: "getMainTreeRoot returns main tree path from worktree"
    target: "mainTreeIsNotWorktree"
    matcher: "equals"
    value: true

file_changes:
  - path: "packages/cli/src/utils/worktree.ts"
    action: modify
  - path: "packages/cli/src/commands/artifact.ts"
    action: modify
  - path: "packages/cli/tests/commands/artifact.test.ts"
    action: modify
