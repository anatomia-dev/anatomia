  - path: "packages/cli/tests/templates/agent-proof-context.test.ts"
    action: modify
  # Component 3 — deterministic veto (Spec 2)
  - path: "packages/cli/src/utils/compliance.ts"
    action: modify
  - path: "packages/cli/src/commands/proof.ts"
    action: modify
  - path: "packages/cli/tests/utils/compliance.test.ts"
