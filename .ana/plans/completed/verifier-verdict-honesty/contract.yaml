  - path: "packages/cli/templates/.codex/agents/ana-verify.md"
    action: modify
  - path: ".claude/agents/ana-verify.md"
    action: modify
  - path: ".codex/agents/ana-verify.md"
    action: modify
  # Component 2 — one verdict function (Spec 1)
  - path: "packages/cli/src/utils/verdict.ts"
    action: create
  - path: "packages/cli/src/utils/proofSummary.ts"
    action: modify
  - path: "packages/cli/src/types/proof.ts"
    action: modify
  - path: "packages/cli/src/commands/work-state.ts"
    action: modify
  - path: "packages/cli/src/commands/artifact.ts"
