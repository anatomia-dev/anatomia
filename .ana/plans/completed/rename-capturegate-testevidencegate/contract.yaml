version: "1.0"
sealed_by: "AnaPlan"
feature: "Rename captureGate → testEvidenceGate (clean rename, no back-compat)"

assertions:
  # AC1 — new projects use the new key
  - id: A001
    says: "New projects turn the test-evidence gate on under its new name"
    block: "createAnaJson emits testEvidenceGate on for new projects"
    target: "createAnaJson result.testEvidenceGate"
    matcher: "equals"
    value: "on"

  # Enablement — new key, with the test-command carve-out
  - id: A002
    says: "Turning the gate on requires test evidence before a build report saves"
    block: "isTestEvidenceGateEnabled is true for testEvidenceGate on with a resolvable test command"
    target: "isTestEvidenceGateEnabled(testEvidenceGate-on project)"
    matcher: "equals"
    value: true

  - id: A003
    says: "Turning the gate off lets a build report save without test evidence"
    block: "isTestEvidenceGateEnabled is false when testEvidenceGate is off"
    target: "isTestEvidenceGateEnabled(testEvidenceGate-off project)"
    matcher: "equals"
    value: false

  - id: A004
    says: "A config with no gate setting is treated as off"
    block: "isTestEvidenceGateEnabled is false when the flag is absent"
    target: "isTestEvidenceGateEnabled(no-flag project)"
    matcher: "equals"
    value: false

  # AC5 — user-facing message names the new flag
  - id: A005
    says: "The block message tells users about the testEvidenceGate setting"
    block: "applyTestEvidenceGate block output names the testEvidenceGate escape hatch"
    target: "gate block stderr"
    matcher: "contains"
    value: "testEvidenceGate"

  # AC6 — config allowlist knows the new key
  - id: A006
    says: "Setting the gate flag is recognized without a warning"
    block: "KNOWN_FIELDS contains testEvidenceGate"
    target: "config KNOWN_FIELDS"
    matcher: "contains"
    value: "testEvidenceGate"

  # Schema accepts the new key
  - id: A007
    says: "Config files can carry the gate setting under its new name"
    block: "AnaJsonSchema parses a testEvidenceGate config"
    target: "AnaJsonSchema.parse({ testEvidenceGate: 'on' }).testEvidenceGate"
    matcher: "equals"
    value: "on"

  # Doctor reporting path reads the new key
  - id: A008
    says: "The doctor view reports the gate state from the new key"
    block: "assessEnforcement reports test_evidence_gate from testEvidenceGate on"
    target: "doctor enforcement.test_evidence_gate for testEvidenceGate on"
    matcher: "not_equals"
    value: "off"

  # AC7 — source-invariant clean sweep. These are the ONLY assertions that catch an
  # incomplete rename: behavioral assertions A001–A008 all pass on the new key alone
  # and are blind to a residual captureGate symbol left behind. Checked mechanically
  # against packages/cli/src/ by Verify (no test written). No kept symbol contains
  # either string — CaptureMarker, parseMarkers, validateCapturePresent, processCapture*
  # are all clear — so zero false positives.
  - id: A009
    says: "The legacy gate flag name is gone from source"
    block: "no captureGate flag string remains in src"
    target: "sourceCode"
    matcher: "not_contains"
    value: "captureGate"

  - id: A010
    says: "No legacy gate symbol remains in source"
    block: "no CaptureGate symbol remains in src"
    target: "sourceCode"
    matcher: "not_contains"
    value: "CaptureGate"

file_changes:
  - path: "packages/cli/src/commands/init/anaJsonSchema.ts"
    action: modify
  - path: "packages/cli/src/commands/artifact.ts"
    action: modify
  - path: "packages/cli/src/utils/capture-marker.ts"
    action: modify
  - path: "packages/cli/src/commands/doctor.ts"
    action: modify
  - path: "packages/cli/src/commands/config.ts"
    action: modify
  - path: "packages/cli/src/commands/init/state.ts"
    action: modify
  - path: "packages/cli/src/utils/forensics.ts"
    action: modify
  - path: ".ana/ana.json"
    action: modify
  - path: "website/content/docs/guides/configurability.mdx"
    action: modify
  - path: "packages/cli/tests/commands/init/anaJsonSchema.test.ts"
    action: modify
  - path: "packages/cli/tests/commands/artifact.test.ts"
    action: modify
  - path: "packages/cli/tests/commands/init.test.ts"
    action: modify
  - path: "packages/cli/tests/commands/doctor.test.ts"
    action: modify
  - path: "packages/cli/tests/commands/config.test.ts"
    action: modify
  - path: "packages/cli/tests/commands/work.test.ts"
    action: modify
