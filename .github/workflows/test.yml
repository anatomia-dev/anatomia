name: Test Suite

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false  # CRITICAL: Run all combinations even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        # Build runs `pnpm typecheck && tsup` internally (Item 1), so this
        # step also gates production type errors. Kept separate from the
        # test-typecheck step below because that file's tsconfig is
        # different and the failures look different in CI logs.
        run: pnpm build

      - name: Typecheck tests
        # Item 19: test files have their own tsconfig.test.json so that
        # strict-mode violations in test code block CI the same way src/
        # violations do. The husky pre-commit hook runs this locally.
        run: cd packages/cli && pnpm typecheck:tests

      - name: Lint
        # Item 21: lint was not previously part of CI. 0 errors enforced
        # via eslint + the husky hook; CI is the backstop.
        run: cd packages/cli && pnpm lint

      - name: Run tests
        run: cd packages/cli && pnpm vitest run

      - name: Upload coverage (Ubuntu + Node 20 only)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        uses: codecov/codecov-action@v6
        with:
          files: ./packages/cli/coverage/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  website:
    name: Website Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check (lint + typecheck + build)
        run: pnpm --filter anatomia-website check
