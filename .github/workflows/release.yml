name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter anatomia-cli build

      # Copy root docs into package for npm (same as prepublishOnly)
      - run: cp README.md packages/cli/README.md && cp CHANGELOG.md packages/cli/CHANGELOG.md

      - run: cd packages/cli && pnpm typecheck:tests

      - run: cd packages/cli && pnpm lint

      - run: cd packages/cli && pnpm vitest run

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Verify CHANGELOG has entry for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "\[${VERSION}\]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md has no entry for version ${VERSION}"
            exit 1
          fi
          if grep -q "\[${VERSION}\].*XX" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md has placeholder date for version ${VERSION}"
            exit 1
          fi

      - run: cd packages/cli && npm publish --provenance --access public

      - run: gh release create ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
